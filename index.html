<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioGuessr</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            overflow: hidden;
        }
        .game-container { 
            text-align: center; 
            padding: 50px; 
            position: relative; 
            z-index: 1;
        }
        .guess-btn { 
            padding: 10px 20px; 
            margin: 5px; 
        }
        .hidden { 
            display: none; 
        }
        #copy-button { 
            margin-top: 15px; 
            cursor: pointer; 
        }
        #copy-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        button {
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body onload="showDate(); updateCountdown(); populateDateDropdown();">
    <div class="game-container">
        <h1>RadioGuessr</h1>
        <h3>Guess where the radio station is located.</h3>
        <button id="toggle-theme">toggle light/dark mode</button>
        <p id="dateText">2024-00-00</p>
        <p id="countdown">Next Station in 00:00:00</p>
        <audio id="radio-player" class="hidden" controls></audio>
        <br>
        <button id="play-button" onclick="playDailyMode()">Play Today's Game</button>
        <br><br>

        <!-- Dropdown for Previous Dates -->
        <label for="previous-date-dropdown">Select a previous date:</label>
        <select id="previous-date-dropdown">
            <option value="">Select a date</option> <!-- Default option -->
        </select>
        <button id="previous-date-button" onclick="startPreviousDailyMode()">Play Previous Game</button>

        <!-- Country Dropdown -->
        <div id="country-selection" class="hidden">
            <label for="country-dropdown">Pick the country:</label>
            <select id="country-dropdown"></select>
            <br><br>
            <button onclick="submitGuess()">Submit Guess</button>
        </div>

        <p id="guesses-left-container" class="hidden">Guesses left: <span id="guesses-left">5</span></p>
        <p id="status-message"></p>
        <p style="display: inline;" id="radio-garden"></p>
        <a id="radio-garden-url" href="#" class="hidden"></a>
        <div>
            <button id="copy-button" class="hidden" onclick="copyToClipboard()">Share</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</body>
</html>
